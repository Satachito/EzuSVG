					<rect class="fixture" x="10" y="10" width="128" height="54" rx="5"/>
					<circle class="fixture" cx="127" cy="37" r="5"/>
				</g>
				<g id="shower">
					<line class="fixture" x1="168" y1="424" x2="168" y2="460"/>
					<rect class="fixture-fill" x="164" y="454" width="8" height="10" rx="1"/>
					<circle class="fixture-fill" cx="162" cy="424" r="5"/>
					<line class="fixture" x1="158" y1="427" x2="150" y2="436" stroke-dasharray="2 4"/>
					<line class="fixture" x1="162" y1="430" x2="155" y2="441" stroke-dasharray="2 4"/>
				</g>
			</g>
			<text class="sub" x="86" y="459" font-size="11">浴槽（シャワー付）</text>

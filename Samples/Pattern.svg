<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
	<defs>
		<pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
			<circle cx="3" cy="3" r="2" fill="#94a3b8"/>
		</pattern>
		<pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
			<path d="M20 0 H0 V20" fill="none" stroke="#cbd5e1" stroke-width="1"/>
		</pattern>
		<linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#f472b6"/>
			<stop offset="1" stop-color="#818cf8"/>
		</linearGradient>
	</defs>
	<rect id="backdrop" x="16" y="16" width="448" height="288" rx="12" fill="url(#grid)" stroke="#94a3b8" stroke-width="1.5"/>
	<rect id="dotted-card" x="48" y="56" width="180" height="200" rx="10" fill="url(#dots)" stroke="#64748b" stroke-width="2"/>
	<circle id="glow-ball" cx="340" cy="130" r="70" fill="url(#glow)"/>
	<rect id="glass" x="272" y="200" width="150" height="70" rx="10" fill="#38bdf8" opacity="0.45" stroke="#0284c7" stroke-width="2"/>
</svg>

		<line class="dim" x1="0" y1="-55" x2="300" y2="-55"/>
		<line class="dim-tick" x1="0" y1="-63" x2="0" y2="-47"/>
		<line class="dim-tick" x1="300" y1="-63" x2="300" y2="-47"/>
		<text class="dim-text" x="150" y="-63">3.0m</text>
		<line class="dim" x1="300" y1="-55" x2="600" y2="-55"/>
		<line class="dim-tick" x1="600" y1="-63" x2="600" y2="-47"/>
		<text class="dim-text" x="450" y="-63">3.0m</text>
		<line class="dim" x1="600" y1="-55" x2="900" y2="-55"/>
		<line class="dim-tick" x1="900" y1="-63" x2="900" y2="-47"/>
		<text class="dim-text" x="750" y="-63">3.0m</text>
		<line class="dim" x1="-28" y1="0" x2="-28" y2="800"/>
		<line class="dim-tick" x1="-36" y1="0" x2="-20" y2="0"/>
		<line class="dim-tick" x1="-36" y1="800" x2="-20" y2="800"/>
		<text class="dim-text" x="-48" y="400" transform="rotate(-90,-48,400)">8.0m</text>
		<line class="dim" x1="-55" y1="0" x2="-55" y2="300"/>
		<line class="dim-tick" x1="-63" y1="0" x2="-47" y2="0"/>
		<line class="dim-tick" x1="-63" y1="300" x2="-47" y2="300"/>
		<text class="dim-text" x="-75" y="150" transform="rotate(-90,-75,150)">3.0m</text>
		<line class="dim" x1="-55" y1="300" x2="-55" y2="800"/>
		<line class="dim-tick" x1="-63" y1="800" x2="-47" y2="800"/>
		<text class="dim-text" x="-75" y="550" transform="rotate(-90,-75,550)">5.0m</text>
		<line class="dim" x1="928" y1="300" x2="928" y2="800"/>

			<rect class="fixture" x="600" y="748" width="80" height="40" rx="3"/>
			<ellipse class="fixture" cx="640" cy="768" rx="20" ry="12"/>
			<line class="fixture" x1="640" y1="748" x2="640" y2="740"/>
			<line class="fixture" x1="628" y1="740" x2="652" y2="740"/>
			<text class="sub" x="640" y="728" font-size="11">シンク</text>
			<rect class="fixture" x="480" y="750" width="90" height="36" rx="2"/>
			<line class="fixture" x1="490" y1="758" x2="560" y2="758" stroke-dasharray="4 3"/>
			<line class="fixture" x1="490" y1="768" x2="560" y2="768" stroke-dasharray="4 3"/>
			<line class="fixture" x1="490" y1="778" x2="560" y2="778" stroke-dasharray="4 3"/>
			<text class="sub" x="525" y="728" font-size="11">まな板</text>
			<rect class="fixture" x="340" y="748" width="80" height="40" rx="2"/>
			<circle class="fixture" cx="362" cy="768" r="10"/>
			<circle class="fixture" cx="398" cy="768" r="10"/>
			<text class="sub" x="380" y="728" font-size="11">コンロ</text>
			<text class="sub" x="510" y="720" font-size="13">キッチン（下部収納）</text>
		</g>


		<text class="room" x="150" y="130">ワークスペース</text>
		<text class="sub"  x="150" y="155">約 9.0㎡（3.0m × 3.0m）</text>
		<text class="sub"  x="150" y="175" font-size="12">移動式カーテン仕切り</text>
		<text class="room" x="450" y="145">寝室</text>
		<text class="sub"  x="450" y="170">約 9.0㎡（3.0m × 3.0m）</text>
		<text class="room" x="750" y="130">クローゼット</text>
		<text class="sub"  x="750" y="155">約 9.0㎡（3.0m × 3.0m）</text>
		<text class="sub"  x="750" y="175" font-size="12">移動式カーテン仕切り</text>
		<text class="room" x="330" y="480">ＬＤＫ</text>
		<text class="sub"  x="330" y="506">約 34.0㎡（中央〜南側）</text>
						<text class="sub" x="706" y="440" font-size="13" text-anchor="end">サニタリー ▶</text>

		<g id="north" transform="translate(858,44)">
			<circle class="fixture" cx="0" cy="0" r="20" fill="#fff"/>
			<polygon points="0,-15 6,7 0,3 -6,7" fill="#1c2429"/>
			<text class="sub" x="0" y="33" font-size="12">北</text>
		</g>


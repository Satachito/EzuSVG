<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 980" width="1080" height="980">
	<title>1LDK 60m2 floor plan</title>
	<desc>East-West 8.0m x North-South 7.5m. Bedroom widened to 3.5m. Sanitary/kitchen/genkan same as 72m2. Scale 100px = 1m.</desc>
	<style>
		.bg { fill: #fff; }
		.wall-out { fill: none; stroke: #111; stroke-width: 14; stroke-linejoin: miter; }
		.wall-in { fill: none; stroke: #111; stroke-width: 6; }
		.wall-thin { fill: none; stroke: #111; stroke-width: 3; }
		.zone { fill: none; stroke: #bbb; stroke-width: 1.5; stroke-dasharray: 6 5; }
		.glass { fill: none; stroke: #111; stroke-width: 2; stroke-dasharray: 8 4; }
		.curtain { fill: none; stroke: #444; stroke-width: 2; stroke-dasharray: 3 6; }
		.dim { fill: none; stroke: #333; stroke-width: 1; }
		.dim-tick { stroke: #333; stroke-width: 1; }
		.dim-text { fill: #222; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 18px; text-anchor: middle; }
		.room { fill: #111; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 20px; font-weight: 600; text-anchor: middle; }
		.sub { fill: #333; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 13px; text-anchor: middle; }
		.fixture { fill: none; stroke: #111; stroke-width: 2; }
		.fixture-fill { fill: #f7f7f7; stroke: #111; stroke-width: 2; }
		.door-arc { fill: none; stroke: #111; stroke-width: 1.5; }
		.title { fill: #111; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 22px; font-weight: 600; }
		.meta { fill: #444; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 13px; }
	</style>
	<rect class="bg" width="1080" height="980"/>
	<g id="plan" transform="translate(100,80)">
		<rect x="0" y="0" width="225" height="250" fill="#f3f3f3"/>
		<rect x="225" y="0" width="350" height="250" fill="#fafafa"/>
		<rect x="575" y="0" width="225" height="250" fill="#f5f5f5"/>
		<rect x="0" y="250" width="620" height="500" fill="#ffffff"/>
		<rect x="0" y="590" width="140" height="160" fill="#f6f6f6"/>
		<g id="sanitary" transform="translate(620,250)">
			<rect x="0" y="0"   width="180" height="180" fill="#fafafa"/>
			<rect x="0" y="180" width="180" height="115" fill="#ffffff"/>
			<rect x="0" y="295" width="180" height="115" fill="#f8f8f8"/>
			<rect x="0" y="410" width="180" height="90"  fill="#eef2f4"/>
			<line class="zone" x1="0" y1="180" x2="180" y2="180"/>
			<line class="zone" x1="0" y1="295" x2="180" y2="295"/>
			<text class="sub" x="96" y="152" font-size="10" fill="#999">脱衣・洗濯</text>
			<g id="bath-slider">
				<line class="glass" x1="90" y1="410" x2="180" y2="410"/>
				<line class="glass" x1="0"  y1="405" x2="94"  y2="405"/>
				<line class="fixture" x1="7" y1="401" x2="7" y2="409"/>
				<line class="fixture" x1="34" y1="398" x2="58" y2="398"/>
				<path class="fixture" d="M 53 395 L 60 398 L 53 401"/>
			</g>
			<text class="sub" x="45" y="392" font-size="10">ガラス引き戸</text>
			<g id="washer" transform="translate(15,12)">
				<rect class="fixture-fill" width="70" height="66" rx="2"/>
				<circle class="fixture" cx="35" cy="33" r="21"/>
				<circle class="fixture" cx="35" cy="33" r="9"/>
				<text class="sub" x="35" y="86" font-size="11">洗濯機</text>
			</g>
			<g id="dryer" transform="translate(95,12)">
				<rect class="fixture-fill" width="70" height="66" rx="2"/>
				<circle class="fixture" cx="35" cy="33" r="21"/>
				<circle class="fixture" cx="35" cy="33" r="6"/>
				<line class="fixture" x1="20" y1="18" x2="50" y2="48"/>

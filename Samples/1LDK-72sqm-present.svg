	</g>

	<text class="meta" x="640" y="1135" text-anchor="middle">ワークスペース ＋ 寝室 ＋ クローゼット（各 3×3m）  ·  東サニタリー  ·  LDK ＋ キッチン（下部収納）＋西カウンターテーブル×2（各1.5×0.65m）</text>

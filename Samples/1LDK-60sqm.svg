		<line class="wall-in" x1="620" y1="250" x2="620" y2="355"/>
		<line class="wall-in" x1="620" y1="420" x2="620" y2="750"/>
		<line class="wall-thin" x1="0" y1="590" x2="140" y2="590"/>
		<line class="wall-thin" x1="140" y1="590" x2="140" y2="610"/>
		<line class="wall-thin" x1="140" y1="720" x2="140" y2="750"/>
		<line class="curtain" x1="225" y1="8" x2="225" y2="242"/>
		<circle cx="225" cy="35" r="4" fill="#444"/>
		<circle cx="225" cy="80" r="4" fill="#444"/>
		<circle cx="225" cy="125" r="4" fill="#444"/>
		<circle cx="225" cy="170" r="4" fill="#444"/>
		<circle cx="225" cy="215" r="4" fill="#444"/>
		<line class="curtain" x1="575" y1="8" x2="575" y2="242"/>
		<circle cx="575" cy="35" r="4" fill="#444"/>
		<circle cx="575" cy="80" r="4" fill="#444"/>
		<circle cx="575" cy="125" r="4" fill="#444"/>
		<circle cx="575" cy="170" r="4" fill="#444"/>
		<circle cx="575" cy="215" r="4" fill="#444"/>

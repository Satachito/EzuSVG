			<rect x="0" y="735" width="150" height="65" fill="#fafafa" stroke="#6a757c" stroke-width="2" stroke-dasharray="8 5"/>
			<rect x="150" y="735" width="150" height="65" fill="#fafafa" stroke="#6a757c" stroke-width="2" stroke-dasharray="8 5"/>
			<text class="sub" x="75" y="758" font-size="10">カウンターテーブル</text>
			<text class="sub" x="75" y="772" font-size="10">（下部収納）</text>
			<text class="sub" x="75" y="786" font-size="9" fill="#8a969c">1.5×0.65m</text>
			<text class="sub" x="225" y="758" font-size="10">カウンターテーブル</text>
			<text class="sub" x="225" y="772" font-size="10">（下部収納）</text>
			<text class="sub" x="225" y="786" font-size="9" fill="#8a969c">1.5×0.65m</text>


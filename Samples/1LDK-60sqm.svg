			<path class="door-arc" d="M 360 250 A 80 80 0 0 0 440 250"/>
			<line class="fixture" x1="360" y1="250" x2="360" y2="170"/>
		</g>
		<g id="door-sanitary">
			<path class="door-arc" d="M 685 420 A 65 65 0 0 1 620 355"/>
			<line class="fixture" x1="620" y1="420" x2="685" y2="420"/>
		</g>
		<g id="door-genkan">
			<line stroke="#fff" stroke-width="16" x1="0" y1="630" x2="0" y2="730"/>
			<path class="door-arc" d="M 0 630 A 90 90 0 0 0 90 730"/>
			<line class="fixture" x1="0" y1="630" x2="90" y2="630"/>
		</g>
		<line class="wall-thin" x1="140" y1="610" x2="152" y2="610"/>
		<line class="wall-thin" x1="140" y1="720" x2="152" y2="720"/>
		<g id="kitchen">
			<polygon class="fixture-fill" points="400,602 468,602 468,704 620,704 620,750 400,750"/>
			<rect class="fixture" x="430" y="714" width="60" height="30" rx="2"/>
			<circle class="fixture" cx="445" cy="729" r="8"/>
			<circle class="fixture" cx="475" cy="729" r="8"/>
			<rect class="fixture" x="540" y="714" width="52" height="30" rx="3"/>
			<ellipse class="fixture" cx="566" cy="729" rx="15" ry="9"/>
		</g>
		<text class="room" x="112" y="100" font-size="16">ワークスペース</text>
		<text class="sub" x="112" y="122">約 5.6㎡（2.3m × 2.5m）</text>
		<text class="sub" x="112" y="140" font-size="11">移動式カーテン</text>
		<text class="room" x="400" y="112">寝室</text>
		<text class="sub" x="400" y="134">約 8.8㎡（3.5m × 2.5m）</text>
		<text class="room" x="687" y="100" font-size="16">クローゼット</text>
		<text class="sub" x="687" y="122">約 5.6㎡（2.3m × 2.5m）</text>
		<text class="sub" x="687" y="140" font-size="11">移動式カーテン</text>
		<text class="room" x="260" y="480">ＬＤＫ</text>
		<text class="sub" x="260" y="504">約 31.0㎡（中央〜南側）</text>
		<text class="sub" x="510" y="692" font-size="12">キッチン</text>
		<text class="sub" x="392" y="642" font-size="12" text-anchor="end">朝食カウンター</text>
		<text class="sub" x="392" y="658" font-size="10" fill="#888" text-anchor="end">（ペニンシュラ）</text>
		<text class="room" x="70" y="676" font-size="15">玄関</text>
		<text class="sub" x="606" y="387" font-size="12" text-anchor="end">サニタリー ▶</text>
		<g id="north" transform="translate(758,40)">
			<circle class="fixture" cx="0" cy="0" r="18" fill="#fff"/>
			<polygon points="0,-13 5,6 0,3 -5,6" fill="#111"/>
			<text class="sub" x="0" y="30" font-size="11">北</text>
		</g>
	</g>
	<g transform="translate(100,80)">
		<line class="dim" x1="0" y1="-28" x2="800" y2="-28"/>
		<line class="dim-tick" x1="0" y1="-36" x2="0" y2="-20"/>
		<line class="dim-tick" x1="800" y1="-36" x2="800" y2="-20"/>
		<text class="dim-text" x="400" y="-36">8.0m</text>
		<line class="dim" x1="0" y1="-55" x2="225" y2="-55"/>
		<line class="dim-tick" x1="0" y1="-63" x2="0" y2="-47"/>
		<line class="dim-tick" x1="225" y1="-63" x2="225" y2="-47"/>
		<text class="dim-text" x="112" y="-63">2.3m</text>
		<line class="dim" x1="225" y1="-55" x2="575" y2="-55"/>
		<line class="dim-tick" x1="575" y1="-63" x2="575" y2="-47"/>
		<text class="dim-text" x="400" y="-63">3.5m</text>
		<line class="dim" x1="575" y1="-55" x2="800" y2="-55"/>
		<line class="dim-tick" x1="800" y1="-63" x2="800" y2="-47"/>
		<text class="dim-text" x="687" y="-63">2.3m</text>
		<line class="dim" x1="-28" y1="0" x2="-28" y2="750"/>
		<line class="dim-tick" x1="-36" y1="0" x2="-20" y2="0"/>
		<line class="dim-tick" x1="-36" y1="750" x2="-20" y2="750"/>
		<text class="dim-text" x="-48" y="375" transform="rotate(-90,-48,375)">7.5m</text>
		<line class="dim" x1="-55" y1="0" x2="-55" y2="250"/>
		<line class="dim-tick" x1="-63" y1="0" x2="-47" y2="0"/>
		<line class="dim-tick" x1="-63" y1="250" x2="-47" y2="250"/>
		<text class="dim-text" x="-75" y="125" transform="rotate(-90,-75,125)">2.5m</text>
		<line class="dim" x1="-55" y1="250" x2="-55" y2="750"/>
		<line class="dim-tick" x1="-63" y1="750" x2="-47" y2="750"/>
		<text class="dim-text" x="-75" y="500" transform="rotate(-90,-75,500)">5.0m</text>
		<line class="dim" x1="828" y1="250" x2="828" y2="750"/>
		<line class="dim-tick" x1="820" y1="250" x2="836" y2="250"/>
		<line class="dim-tick" x1="820" y1="750" x2="836" y2="750"/>
		<text class="dim-text" x="852" y="500" transform="rotate(90,852,500)">5.0m</text>
		<line class="dim" x1="620" y1="778" x2="800" y2="778"/>
		<line class="dim-tick" x1="620" y1="770" x2="620" y2="786"/>
		<line class="dim-tick" x1="800" y1="770" x2="800" y2="786"/>
		<text class="dim-text" x="710" y="798">1.8m</text>
		<line class="dim" x1="0" y1="778" x2="620" y2="778"/>
		<line class="dim-tick" x1="0" y1="770" x2="0" y2="786"/>
		<text class="dim-text" x="310" y="798">6.2m</text>
	</g>
	<text class="title" x="100" y="940">1LDK 間取り図（約60㎡・ワンルーム寄り）</text>
	<text class="meta" x="100" y="964">建物：東西 8.0m × 南北 7.5m　／　寝室 3.5×2.5m　／　サニタリー・キッチン・玄関は72㎡案と同寸　／　ワーク・クロゼット各 2.3×2.5m</text>
</svg>

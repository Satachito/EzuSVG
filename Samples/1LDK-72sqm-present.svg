		<circle cx="300" cy="40"  r="3.5" fill="#6b5b4e"/>
		<circle cx="300" cy="100" r="3.5" fill="#6b5b4e"/>
		<circle cx="300" cy="160" r="3.5" fill="#6b5b4e"/>

				<ellipse class="fixture-fill" cx="50" cy="55" rx="28" ry="34"/>
				<ellipse class="fixture" cx="50" cy="50" rx="14" ry="19"/>
			</g>
			<text class="sub" x="38" y="242" font-size="11">トイレ</text>
			<g id="washbasin" transform="translate(92,318.5) rotate(90,55,34)">
				<rect class="fixture-fill" x="0" y="8" width="110" height="52" rx="4"/>
				<ellipse class="fixture" cx="55" cy="34" rx="35" ry="16"/>
				<line class="fixture" x1="55" y1="8" x2="55" y2="-2"/>
				<line class="fixture" x1="45" y1="-2" x2="65" y2="-2"/>
			</g>
			<text class="sub" x="60" y="352" font-size="11">洗面台</text>
			<g id="unit-bath">
				<rect class="fixture" x="6" y="414" width="168" height="82" rx="8"/>
				<g id="bathtub" transform="translate(16,418)">
					<rect class="fixture-fill" width="148" height="74" rx="6"/>
					<rect class="fixture" x="10" y="10" width="128" height="54" rx="5"/>
					<circle class="fixture" cx="127" cy="37" r="5"/>
				</g>
				<g id="shower">
					<line class="fixture" x1="168" y1="424" x2="168" y2="460"/>
					<rect class="fixture-fill" x="164" y="454" width="8" height="10" rx="1"/>
					<circle class="fixture-fill" cx="162" cy="424" r="5"/>
					<line class="fixture" x1="158" y1="427" x2="150" y2="436" stroke-dasharray="2 4"/>
					<line class="fixture" x1="162" y1="430" x2="155" y2="441" stroke-dasharray="2 4"/>
				</g>
			</g>
			<text class="sub" x="86" y="459" font-size="11">浴槽（シャワー付）</text>

		</g>
		<rect class="wall-out" x="0" y="0" width="800" height="750"/>

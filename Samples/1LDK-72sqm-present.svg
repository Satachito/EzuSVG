<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1180" width="1280" height="1180">
	<defs>
		<filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
			<feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a1f24" flood-opacity="0.10"/>
		</filter>
		<style><![CDATA[
			.paper { fill: #eef1f3; }
			.card { fill: #ffffff; }
			.wall-out { fill: none; stroke: #1c2429; stroke-width: 13; stroke-linejoin: miter; }
			.wall-in { fill: none; stroke: #1c2429; stroke-width: 5.5; }
			.wall-thin { fill: none; stroke: #2a343a; stroke-width: 2.5; }
			.zone { fill: none; stroke: #b7c0c6; stroke-width: 1.4; stroke-dasharray: 6 5; }
			.glass { fill: none; stroke: #4a6b7c; stroke-width: 2; stroke-dasharray: 7 4; }
			.curtain { fill: none; stroke: #6b5b4e; stroke-width: 2; stroke-dasharray: 2 5; }
			.dim { fill: none; stroke: #6a757c; stroke-width: 1; }
			.dim-tick { stroke: #6a757c; stroke-width: 1; }
			.dim-text { fill: #4a555c; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 17px; text-anchor: middle; letter-spacing: 0.02em; }
			.room { fill: #1c2429; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 21px; font-weight: 600; text-anchor: middle; letter-spacing: 0.08em; }
			.sub { fill: #5a666e; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 13px; text-anchor: middle; }
			.fixture { fill: none; stroke: #1c2429; stroke-width: 1.8; }
			.fixture-fill { fill: #f3f5f6; stroke: #1c2429; stroke-width: 1.8; }
			.door-arc { fill: none; stroke: #1c2429; stroke-width: 1.4; }
			.hero { fill: #1c2429; font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif; font-size: 36px; font-weight: 600; letter-spacing: 0.12em; }
			.tag { fill: #6a757c; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 14px; letter-spacing: 0.18em; }
			.meta { fill: #7a868d; font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; font-size: 13px; }
			.rule { stroke: #c5ced3; stroke-width: 1; }
		]]></style>
	</defs>

	<!-- ambient paper -->
	<rect class="paper" width="1280" height="1180"/>
	<!-- subtle corner marks -->
	<path fill="none" stroke="#c5ced3" stroke-width="1.2" d="M48 48 H88 M48 48 V88"/>
	<path fill="none" stroke="#c5ced3" stroke-width="1.2" d="M1232 48 H1192 M1232 48 V88"/>
	<path fill="none" stroke="#c5ced3" stroke-width="1.2" d="M48 1132 H88 M48 1132 V1092"/>
	<path fill="none" stroke="#c5ced3" stroke-width="1.2" d="M1232 1132 H1192 M1232 1132 V1092"/>

	<!-- title -->
	<text class="tag" x="640" y="72" text-anchor="middle">FLOOR PLAN  ·  72㎡</text>
	<text class="hero" x="640" y="118" text-anchor="middle">1LDK 間取り図</text>
	<line x1="520" y1="138" x2="760" y2="138" stroke="#c5ced3" stroke-width="1"/>
	<text class="meta" x="640" y="162" text-anchor="middle">東西 9.0m × 南北 8.0m  ·  縮尺 1:100</text>

	<!-- white card with soft shadow -->
	<rect x="70" y="190" width="1140" height="900" rx="4" class="card" filter="url(#softShadow)"/>

	<!-- plan content shifted into card -->
	<g transform="translate(140,260)">
		<!-- soft room washes -->
		<rect x="0"   y="0"   width="300" height="300" fill="#ebe4dc"/> <!-- workspace: warm clay -->
		<rect x="300" y="0"   width="300" height="300" fill="#f4f1ec"/> <!-- bedroom -->
		<rect x="600" y="0"   width="300" height="300" fill="#e5e8ea"/> <!-- closet -->
		<rect x="0"   y="300" width="720" height="500" fill="#fafbfc"/> <!-- LDK -->

		<!-- sanitary -->
		<g id="sanitary" transform="translate(720,300)">
			<rect x="0" y="0"   width="180" height="180" fill="#e8eef0"/>
			<rect x="0" y="180" width="180" height="115" fill="#f7fafb"/>
			<rect x="0" y="295" width="180" height="115" fill="#eef3f5"/>
			<rect x="0" y="410" width="180" height="90"  fill="#dde8ec"/>
			<line class="zone" x1="0" y1="180" x2="180" y2="180"/>
			<line class="zone" x1="0" y1="295" x2="180" y2="295"/>
			<text class="sub" x="96" y="152" font-size="10" fill="#8a969c">脱衣・洗濯</text>
			<g id="bath-slider">
